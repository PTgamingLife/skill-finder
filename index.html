<style>
:root{
  --sf-bg:#FDFBF7; --sf-gold:#E0A83B; --sf-gold-deep:#B9821F; --sf-ink:#3A2E1B;
  --sf-ink-soft:#7A6A4F; --sf-card:#FFFFFF; --sf-line:#EFE6D4; --sf-stone:#F6EFE1;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;background:var(--sf-bg);color:var(--sf-ink);line-height:1.6}
/* ---------- hero ---------- */
.sf-hero{max-width:1080px;margin:0 auto;padding:72px 24px 36px;text-align:center}
.sf-hero .sf-mascot{width:96px;height:96px;margin:0 auto 18px;animation:sfFloat 3s ease-in-out infinite}
@keyframes sfFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.sf-hero h1{font-size:clamp(2rem,5vw,3.2rem);letter-spacing:.02em}
.sf-hero h1 em{font-style:normal;color:var(--sf-gold-deep);background:linear-gradient(transparent 62%,rgba(224,168,59,.35) 62%)}
.sf-hero p{margin-top:14px;color:var(--sf-ink-soft);font-size:1.05rem}
.sf-scroll-hint{margin-top:26px;color:var(--sf-gold-deep);font-size:.9rem;animation:sfFloat 2s ease-in-out infinite}
/* ---------- sticky search bar ---------- */
.sf-bar{position:sticky;top:0;z-index:50;background:rgba(253,251,247,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--sf-line);padding:14px 24px}
.sf-bar-inner{max-width:1080px;margin:0 auto}
.sf-search{display:flex;align-items:center;gap:10px;background:var(--sf-card);border:2px solid var(--sf-line);border-radius:14px;padding:10px 16px;transition:border-color .2s}
.sf-search:focus-within{border-color:var(--sf-gold)}
.sf-search svg{flex:none}
.sf-search input{flex:1;border:none;outline:none;font-size:1rem;background:transparent;color:var(--sf-ink)}
.sf-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.sf-chip{border:1.5px solid var(--sf-line);background:var(--sf-card);color:var(--sf-ink-soft);border-radius:999px;padding:5px 14px;font-size:.87rem;cursor:pointer;transition:all .15s;user-select:none}
.sf-chip:hover{border-color:var(--sf-gold)}
.sf-chip.sf-on{background:var(--sf-gold);border-color:var(--sf-gold);color:#fff;font-weight:700}
.sf-count{margin-top:8px;font-size:.82rem;color:var(--sf-ink-soft)}
/* ---------- grid & stone cards ---------- */
.sf-main{max-width:1080px;margin:0 auto;padding:34px 24px 60px}
.sf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:22px}
.sf-slot{position:relative}
.sf-card{position:relative;background:var(--sf-card);border:1px solid var(--sf-line);border-radius:16px;padding:20px;height:100%;display:flex;flex-direction:column;gap:10px;box-shadow:0 3px 0 var(--sf-stone),0 10px 24px rgba(58,46,27,.06);opacity:0;transform:translateX(-90px) rotate(-3deg)}
.sf-slot.sf-r .sf-card{transform:translateX(90px) rotate(3deg)}
.sf-slot.sf-in .sf-card{animation:sfPushL .6s cubic-bezier(.22,1.1,.36,1) forwards}
.sf-slot.sf-in.sf-r .sf-card{animation-name:sfPushR}
@keyframes sfPushL{to{opacity:1;transform:translateX(0) rotate(0)}}
@keyframes sfPushR{to{opacity:1;transform:translateX(0) rotate(0)}}
/* the little Claude figure that pushes the stone */
.sf-pusher{position:absolute;top:50%;left:-16px;width:62px;height:62px;z-index:2;opacity:0;pointer-events:none}
.sf-slot.sf-r .sf-pusher{left:auto;right:-14px;transform:scaleX(-1)}
.sf-slot.sf-in .sf-pusher{animation:sfPusherGo 1.1s ease-out forwards}
.sf-slot.sf-in.sf-r .sf-pusher{animation-name:sfPusherGoR}
@keyframes sfPusherGo{
  0%{opacity:1;transform:translate(-90px,-50%)}
  50%{opacity:1;transform:translate(-6px,-50%)}
  64%{transform:translate(-6px,-72%)}
  76%{transform:translate(-6px,-50%)}
  88%{transform:translate(-6px,-66%)}
  100%{opacity:0;transform:translate(-6px,-50%)}
}
@keyframes sfPusherGoR{
  0%{opacity:1;transform:scaleX(-1) translate(-90px,-50%)}
  50%{opacity:1;transform:scaleX(-1) translate(-6px,-50%)}
  64%{transform:scaleX(-1) translate(-6px,-72%)}
  76%{transform:scaleX(-1) translate(-6px,-50%)}
  88%{transform:scaleX(-1) translate(-6px,-66%)}
  100%{opacity:0;transform:scaleX(-1) translate(-6px,-50%)}
}
.sf-card h3{font-size:1.08rem;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sf-badge{font-size:.68rem;font-weight:700;color:#fff;background:var(--sf-gold);border-radius:6px;padding:2px 7px;letter-spacing:.05em}
.sf-badge.sf-official{background:#8A6A2F}
.sf-desc{font-size:.92rem;color:var(--sf-ink-soft);flex:1}
.sf-tags{display:flex;flex-wrap:wrap;gap:6px}
.sf-tag{font-size:.74rem;color:var(--sf-gold-deep);background:rgba(224,168,59,.13);border-radius:6px;padding:2px 8px}
.sf-meta{display:flex;align-items:center;justify-content:space-between;gap:8px;border-top:1px dashed var(--sf-line);padding-top:12px;margin-top:2px}
.sf-repo{font-size:.78rem;color:var(--sf-ink-soft);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sf-star{font-size:.82rem;color:var(--sf-gold-deep);font-weight:700;white-space:nowrap}
.sf-go{display:block;text-align:center;margin-top:4px;background:var(--sf-gold);color:#fff;text-decoration:none;font-weight:700;font-size:.92rem;border-radius:10px;padding:9px 0;transition:background .15s,transform .1s}
.sf-go:hover{background:var(--sf-gold-deep);transform:translateY(-1px)}
.sf-empty{display:none;text-align:center;padding:70px 0;color:var(--sf-ink-soft)}
.sf-empty svg{width:72px;height:72px;margin-bottom:12px;opacity:.7}
/* ---------- footer ---------- */
.sf-foot{border-top:1px solid var(--sf-line);text-align:center;padding:28px 24px 40px;font-size:.8rem;color:var(--sf-ink-soft)}
.sf-foot a{color:var(--sf-gold-deep)}
@media (prefers-reduced-motion:reduce){.sf-card{opacity:1!important;transform:none!important;animation:none!important}.sf-pusher{display:none}}
</style>
</head>

// ---------- render ----------
const sf_grid = document.getElementById("sf_grid");
const sf_fmtStar = n => n>=1000 ? (n/1000).toFixed(1).replace(/\.0$/,"")+"k" : String(n);
function sf_render(list){
  sf_grid.innerHTML = list.map((k,i)=>`
  <div class="sf-slot${i%2?" sf-r":""}">
    <div class="sf-pusher">
      <svg viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <!-- speed lines -->
        <path d="M2 18 h7 M0 26 h6 M3 34 h7" stroke="#E0A83B" stroke-width="1.8" stroke-linecap="round" opacity=".65"/>
        <g transform="rotate(10 24 28)">
          <!-- back leg (pushing off) -->
          <rect x="8" y="36" width="12" height="4.6" rx="2.3" fill="#B9821F" transform="rotate(28 8 36)"/>
          <!-- front leg (bent) -->
          <rect x="20" y="38" width="4.6" height="10" rx="2.3" fill="#B9821F"/>
          <ellipse cx="22.5" cy="48" rx="4" ry="2.2" fill="#8A6A2F"/>
          <!-- body (leaning) -->
          <rect x="13" y="24" width="17" height="16" rx="8" fill="#E0A83B" stroke="#B9821F" stroke-width="1.6"/>
          <ellipse cx="22" cy="33" rx="5" ry="4.4" fill="#FDFBF7"/>
          <!-- arms extended to the stone -->
          <rect x="26" y="24" width="16" height="4.4" rx="2.2" fill="#B9821F" transform="rotate(-8 26 24)"/>
          <rect x="26" y="31" width="17" height="4.4" rx="2.2" fill="#B9821F" transform="rotate(6 26 31)"/>
          <circle cx="43" cy="23.5" r="2.6" fill="#E0A83B" stroke="#B9821F" stroke-width="1.2"/>
          <circle cx="44" cy="34.5" r="2.6" fill="#E0A83B" stroke="#B9821F" stroke-width="1.2"/>
          <!-- head (looking at the stone) -->
          <circle cx="21" cy="14" r="9.5" fill="#E0A83B" stroke="#B9821F" stroke-width="1.6"/>
          <!-- hard hat -->
          <path d="M12 12.5 A9 9 0 0 1 30 12.5 Z" fill="#B9821F"/>
          <rect x="10.5" y="11.5" width="21" height="3" rx="1.5" fill="#8A6A2F"/>
          <!-- determined face, eyes toward stone -->
          <circle cx="23" cy="16.5" r="1.6" fill="#3A2E1B"/><circle cx="28" cy="16.5" r="1.6" fill="#3A2E1B"/>
          <path d="M24 21.5 h4.5" stroke="#3A2E1B" stroke-width="1.5" stroke-linecap="round"/>
          <ellipse cx="20" cy="19.5" rx="1.8" ry="1.3" fill="#F3C878"/>
          <!-- sweat drop -->
          <path d="M11 8 q-1.6 2.4 0 3.6 q1.6 -1.2 0 -3.6" fill="#9CC8E8"/>
        </g>
      </svg>
    </div>
    <div class="sf-card">
      <h3>${k.n}${k.o?'<span class="sf-badge sf-official">官方</span>':""}</h3>
      <p class="sf-desc">${k.d}</p>
      <div class="sf-tags">${k.c.map(c=>`<span class="sf-tag">${sf_cats[c]}</span>`).join("")}</div>
      <div class="sf-meta"><span class="sf-repo">${k.r}</span><span class="sf-star">★ ${sf_fmtStar(k.s)}</span></div>
      <a class="sf-go" href="${k.u}" target="_blank" rel="noopener">前往 GitHub →</a>
    </div>
  </div>`).join("");
  document.getElementById("sf_count").textContent = `顯示 ${list.length} / ${sf_skills.length} 個 skills`;
  document.getElementById("sf_empty").style.display = list.length ? "none" : "block";
  sf_observe();
}
// ---------- scroll-in animation ----------
let sf_io;
function sf_observe(){
  if(sf_io) sf_io.disconnect();
  sf_io = new IntersectionObserver(es=>{
    es.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add("sf-in"); sf_io.unobserve(e.target);} });
  },{threshold:.15,rootMargin:"0px 0px -40px 0px"});
  document.querySelectorAll(".sf-slot:not(.sf-in)").forEach(el=>sf_io.observe(el));
}
// ---------- filter ----------
const sf_active = new Set();
const sf_chipsEl = document.getElementById("sf_chips");
sf_chipsEl.innerHTML = `<button class="sf-chip sf-on" data-c="">全部</button>`+
  Object.entries(sf_cats).map(([k,v])=>`<button class="sf-chip" data-c="${k}">${v}</button>`).join("");
sf_chipsEl.addEventListener("click",e=>{
  const b = e.target.closest(".sf-chip"); if(!b) return;
  const c = b.dataset.c;
  if(c===""){ sf_active.clear(); }
  else { sf_active.has(c) ? sf_active.delete(c) : sf_active.add(c); }
  sf_chipsEl.querySelectorAll(".sf-chip").forEach(x=>{
    x.classList.toggle("sf-on", x.dataset.c==="" ? sf_active.size===0 : sf_active.has(x.dataset.c));
  });
  sf_apply();
});
const sf_input = document.getElementById("sf_search");
sf_input.addEventListener("input", sf_apply);
function sf_apply(){
  const q = sf_input.value.trim().toLowerCase();
  const list = sf_skills.filter(k=>{
    const catOK = sf_active.size===0 || k.c.some(c=>sf_active.has(c));
    if(!catOK) return false;
    if(!q) return true;
    const hay = (k.n+" "+k.d+" "+k.r+" "+k.c.map(c=>sf_cats[c]).join(" ")).toLowerCase();
    return q.split(/\s+/).every(t=>hay.includes(t));
  });
  sf_render(list);
}
document.getElementById("sf_total").textContent = sf_skills.length;
sf_render(sf_skills);
</script>
